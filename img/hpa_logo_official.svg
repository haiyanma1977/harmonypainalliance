<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 90 90">
  <\!-- Blue rounded rectangle background -->
  <rect x="0" y="0" width="90" height="90" rx="6" ry="6" fill="#073880"/>
  <\!-- White H-cross pattern (4 crosses on 9x9 grid, each cell=10) -->
  <\!-- Top cross -->
  <rect x="40" y="10" width="10" height="10" fill="#fff"/>
  <rect x="30" y="20" width="30" height="10" fill="#fff"/>
  <\!-- Left cross -->
  <rect x="20" y="30" width="10" height="30" fill="#fff"/>
  <rect x="10" y="40" width="20" height="10" fill="#fff"/>
  <\!-- Center column (shared by top + bottom crosses) -->
  <rect x="40" y="30" width="10" height="10" fill="#fff"/>
  <rect x="40" y="50" width="10" height="10" fill="#fff"/>
  <\!-- Right cross -->
  <rect x="60" y="30" width="10" height="30" fill="#fff"/>
  <rect x="60" y="40" width="20" height="10" fill="#fff"/>
  <\!-- Bottom cross -->
  <rect x="30" y="60" width="30" height="10" fill="#fff"/>
  <rect x="40" y="70" width="10" height="10" fill="#fff"/>
</svg>
